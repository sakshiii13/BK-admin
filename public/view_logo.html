<!DOCTYPE html>
<html>
<head>
<style>
  body { background-color: #222; color: white; text-align: center; padding: 50px; }
  img { max-width: 500px; max-height: 500px; border: 1px solid white; background-color: #fff; }
  .dark-bg { background-color: #000; margin-top: 20px; }
</style>
</head>
<body>
  <h1>Logo Viewer</h1>
  <div>
    <h2>White Background</h2>
    <img src="logo.png" alt="logo" />
  </div>
  <div class="dark-bg">
    <h2>Black Background</h2>
    <img src="logo.png" alt="logo" style="background-color: #000;" />
  </div>
</body>
</html>
